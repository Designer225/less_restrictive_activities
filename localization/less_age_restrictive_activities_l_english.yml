 setting_adventurer_roaming_unlock_default:0 "Default"
 setting_adventurer_roaming_unlock_default_desc:0 "Roaming requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are retained. (This is the game default.)"
 setting_adventurer_roaming_unlock_relaxed:0 "Relaxed"
 setting_adventurer_roaming_unlock_relaxed_desc:0 "Roaming requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are lifted for everyone. However, characters who do not otherwise meet the requirements will have to pay a minor cost."
