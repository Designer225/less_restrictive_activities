 rule_inspection_unlock:0 "[GetActivityType('activity_survey').GetName] Unlock"
 setting_inspection_unlock_perk:0 "Requires [perk|E]"
 setting_inspection_unlock_perk_desc:0 "The [GetActivityType('activity_survey').GetName] activity requires the [GetPerk('local_inspection_perk').GetName(GetNullCharacter)] [perk|E], a [government_bureaucratic_type|E]-based [government|E], or a faith that enables the activity at the cost of [piety|E]. (This is the game default.)."
 setting_inspection_unlock_perk_or_child:0 "Requires [perk|E] (Relaxed)"
 setting_inspection_unlock_perk_or_child_desc:0 "The [GetActivityType('activity_survey').GetName] activity requires the [GetPerk('local_inspection_perk').GetName(GetNullCharacter)] [perk|E], a [government_bureaucratic_type|E]-based [government|E], or a faith that enables the activity at the cost of [piety|E]. Restrictions are temporarily lifted for [children|E]."
 setting_inspection_unlock_focus:0 "Requires [focus|E]"
 setting_inspection_unlock_focus_desc:0 "The [GetActivityType('activity_survey').GetName] activity requires the [GetFocus('wanderer_internal_affairs_focus').GetName] focus active, the [GetPerk('local_inspection_perk').GetName(GetNullCharacter)] [perk|E], a [government_bureaucratic_type|E]-based [government|E], or a faith that enables the activity at the cost of [piety|E]."
