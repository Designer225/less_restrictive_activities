 setting_adventurer_roaming_unlock_free_desc:0 "Roaming requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are lifted for everyone."
 
 rule_adventurer_domain_unlock:0 "[GetDecisionWithKey('become_landless_adventurer_decision').GetName] Roaming Unlock"
 setting_adventurer_domain_unlock_default:0 "Default"
 setting_adventurer_domain_unlock_default_desc:0 "The [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] requires a maximum [domain|E] size of 3. (This is the game default.)"
 setting_adventurer_domain_unlock_extreme_scaled:0 "Extreme Scaled"
 setting_adventurer_domain_unlock_extreme_scaled_desc:0 "The [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] has a soft maximum [domain|E] size of 3. Beyond this point, each domain requires 10000 more [gold|E], 2000 [prestige|E], and 2000 [piety|E]. This greatly discourages established powers from attempting to become an [adventurer|E]."
 setting_adventurer_domain_unlock_high_scaled:0 "High Scaled"
 setting_adventurer_domain_unlock_high_scaled_desc:0 "The [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] has a soft maximum [domain|E] size of 3. Beyond this point, each domain requires 2500 more [gold|E], 500 [prestige|E], and 500 [piety|E]. This discourages established powers from attempting to become an [adventurer|E]."
 setting_adventurer_domain_unlock_low_scaled:0 "Low Scaled"
 setting_adventurer_domain_unlock_low_scaled_desc:0 "#N (Not recommended!)#! The [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] has a soft maximum [domain|E] size of 3. Beyond this point, each domain requires 500 more [gold|E], 100 [prestige|E], and 100 [piety|E]. This lightly discourages established powers from attempting to become an [adventurer|E]."
 setting_adventurer_domain_unlock_player_only:0 "Player Only"
 setting_adventurer_domain_unlock_player_only_desc:0 "The [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] has a soft maximum [domain|E] size of 3. Beyond this point, only players have access to this decision while AIs cannot take this decision."
 setting_adventurer_domain_unlock_free:0 "Free"
 setting_adventurer_domain_unlock_free_desc:0 "#N (Highly not recommended!)#! The [domain|E] requirement of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] is lifted."