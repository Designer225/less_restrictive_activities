 rule_adventurer_cultural_unlock:0 "[GetDecisionWithKey('become_landless_adventurer_decision').GetName] [culture|E] Unlock"
 setting_adventurer_cultural_unlock_default:0 "Default"
 setting_adventurer_cultural_unlock_default_desc:0 "[cultural|E] requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are retained. (This is the game default.)"
 setting_adventurer_cultural_unlock_relaxed:0 "Relaxed"
 setting_adventurer_cultural_unlock_relaxed_desc:0 "[cultural|E] requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are lifted for everyone. However, characters who do not otherwise meet the requirements will have to pay a minor cost."
 setting_adventurer_cultural_unlock_player_only:0 "Free (Player Only)"
 setting_adventurer_cultural_unlock_player_only_desc:0 "[cultural|E] requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are lifted for players. All other characters still have to abide by them."
 setting_adventurer_cultural_unlock_free:0 "Free"
 setting_adventurer_cultural_unlock_free_desc:0 "[cultural|E] requirements of the [GetDecisionWithKey('become_landless_adventurer_decision').GetName] [decision|E] are lifted for everyone."

